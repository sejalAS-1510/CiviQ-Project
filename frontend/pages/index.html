<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CiviQ | Community Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link rel="stylesheet" href="../css/style.css" />
  </head>
  <body class="bg-[#f3f2ed] text-[#2b2d42]">
    <header
      class="fixed top-0 left-0 right-0 h-16 bg-[#f3f2ed]/90 backdrop-blur-xl border-b border-[#dcdbd2] z-50 flex items-center justify-between px-8"
    >
      <div class="flex items-center gap-6">
        <button>
          onclick="toggleSidebar()" class="text-[#3f4234] hover:rotate-90
          transition-transform duration-500" >
          <i class="fa-solid fa-plus text-xl"></i>
        </button>
        <span class="text-2xl font-serif italic tracking-tighter text-[#3f4234]"
          >CiviQ</span
        >
      </div>

      <div id="top-right-actions" class="flex items-center gap-4">
        <button
          id="loginBtn"
          onclick="handleLogin()"
          class="text-[10px] font-bold tracking-[0.2em] border border-[#3f4234] px-6 py-2 rounded-full hover:bg-[#3f4234] hover:text-white transition-all"
        >
          SIGN IN
        </button>
      </div>
    </header>

    <aside
      id="sidebar"
      class="fixed top-16 left-0 w-64 h-[calc(100vh-64px)] bg-[#fdfcf9] border-r border-[#dcdbd2] transition-transform -translate-x-full z-40 flex flex-col p-6"
    >
      <nav class="flex-1 space-y-2">
        <button
          onclick="loadSection('dashboard')"
          class="nav-item active w-full"
        >
          <i class="fa-solid fa-house"></i><span>Overview</span>
        </button>
        <button
          id="nav-report"
          onclick="loadSection('report')"
          class="nav-item w-full"
        >
          <i class="fa-solid fa-feather"></i><span>Report Issue</span>
        </button>
        <button onclick="loadSection('board')" class="nav-item w-full">
          <i class="fa-solid fa-clapperboard"></i><span>The Board</span>
        </button>
        <button
          id="nav-analytics"
          onclick="loadSection('analytics')"
          class="nav-item hidden w-full"
        >
          <i class="fa-solid fa-chart-line"></i><span>Analytics</span>
        </button>
      </nav>

      <div id="profile-section" class="pt-6 border-t border-[#dcdbd2] hidden">
        <button
          onclick="loadSection('profile')"
          class="w-full flex items-center gap-3 p-4 hover:bg-[#e2e2da] rounded-[24px] transition-all group text-left"
        >
          <div
            class="w-11 h-11 rounded-full bg-[#3f4234] flex items-center justify-center text-[#f3f2ed] font-serif italic text-lg shadow-sm group-hover:scale-105 transition-transform"
          >
            A
          </div>

          <div class="overflow-hidden">
            <p id="user-name" class="text-sm font-bold truncate text-[#2b2d42]">
              Arjun Kumar
            </p>
            <p
              id="user-role"
              class="text-[10px] uppercase tracking-[0.15em] text-[#6b705c] font-semibold"
            >
              Resident
            </p>
          </div>

          <i
            class="fa-solid fa-gear ml-auto text-[#6b705c] opacity-30 group-hover:opacity-100 group-hover:rotate-90 transition-all"
          ></i>
        </button>
      </div>
    </aside>

    <main id="main-content" class="pt-24 px-8 transition-all duration-300">
      <div id="content-area" class="max-w-5xl mx-auto"></div>
    </main>

    <script src="../js/main.js"></script>
  </body>
</html>
